<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WannaGo</title>
    
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Шапка */
        .header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ffe6d5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-image {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ff8a5c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        
        .title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .title span {
            color: #ff8a5c;
        }
        
        /* Описание */
        .description {
            padding: 16px;
            background: #fff8f0;
            border-bottom: 1px solid #ffe6d5;
            text-align: center;
            font-size: 14px;
            color: #2d3436;
            line-height: 1.5;
        }
        
        /* Карта */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }
        
        /* Кнопка добавления */
        .add-button {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #ff8a5c;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(255, 138, 92, 0.4);
            border: 2px solid white;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
        }
        
        .add-button:active {
            transform: scale(0.95);
        }
        
        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3436;
        }
        
        .modal-subtitle {
            font-size: 14px;
            color: #b2bec3;
            margin-bottom: 20px;
        }
        
        .modal-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ffe6d5;
            border-radius: 16px;
            font-size: 15px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #ff8a5c;
        }
        
        .modal-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ffe6d5;
            border-radius: 16px;
            font-size: 15px;
            margin-bottom: 20px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-textarea:focus {
            outline: none;
            border-color: #ff8a5c;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-button:active {
            opacity: 0.8;
        }
        
        .save {
            background: #ff8a5c;
            color: white;
        }
        
        .cancel {
            background: #f1f3f8;
            color: #2d3436;
        }
        
        /* Попап точки */
        .point-popup {
            padding: 12px;
            min-width: 200px;
        }
        
        .point-popup h3 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #2d3436;
        }
        
        .point-popup p {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .point-popup small {
            color: #b2bec3;
            font-size: 11px;
            display: block;
            margin-bottom: 10px;
        }
        
        .delete-point {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .delete-point:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-image">WG</div>
        <div class="title">Wanna<span>Go</span></div>
    </div>
    
    <div class="description">
        Отмечай любимые места, открывай маршруты других путешественников и создавай своё идеальное путешествие
    </div>
    
    <div id="map"></div>
    
    <button class="add-button" id="addBtn">+</button>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">Новая точка</div>
            <div class="modal-subtitle">Поделись любимым местом</div>
            <input type="text" class="modal-input" id="pointName" placeholder="Название места" autocomplete="off">
            <textarea class="modal-textarea" id="pointDesc" placeholder="Описание (необязательно)" rows="3"></textarea>
            <div class="modal-buttons">
                <button class="modal-button cancel" id="cancelBtn">Отмена</button>
                <button class="modal-button save" id="saveBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- OpenLayers JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    
    <script>
        window.onload = function() {
            try {
                // Создаем карту OpenLayers
                const map = new ol.Map({
                    target: 'map',
                    layers: [
                        new ol.layer.Tile({
                            source: new ol.source.OSM() // OpenStreetMap слой
                        })
                    ],
                    view: new ol.View({
                        center: ol.proj.fromLonLat([37.6176, 55.7558]), // [долгота, широта]
                        zoom: 10
                    })
                });
                
                // Массив для хранения точек
                let points = [];
                const markers = [];
                
                // Функция создания маркера
                function createMarker(point) {
                    // Создаем векторный слой с точкой
                    const markerLayer = new ol.layer.Vector({
                        source: new ol.source.Vector({
                            features: [
                                new ol.Feature({
                                    geometry: new ol.geom.Point(ol.proj.fromLonLat([point.lng, point.lat])),
                                    name: point.name,
                                    description: point.description,
                                    date: point.date,
                                    id: point.id
                                })
                            ]
                        })
                    });
                    
                    // Добавляем слой на карту
                    map.addLayer(markerLayer);
                    
                    // Сохраняем ссылку на слой
                    markers.push({
                        layer: markerLayer,
                        id: point.id
                    });
                    
                    // Добавляем всплывающее окно при клике
                    map.on('click', function(evt) {
                        const feature = map.forEachFeatureAtPixel(evt.pixel, function(feat) {
                            return feat;
                        });
                        
                        if (feature) {
                            const coords = feature.getGeometry().getCoordinates();
                            const name = feature.get('name');
                            const desc = feature.get('description');
                            const date = feature.get('date');
                            const id = feature.get('id');
                            
                            // Создаем элемент для попапа
                            const popupContent = document.createElement('div');
                            popupContent.className = 'point-popup';
                            popupContent.innerHTML = `
                                <h3>${name}</h3>
                                <p>${desc || '✨ Без описания'}</p>
                                <small>Добавлено: ${new Date(date).toLocaleDateString('ru-RU')}</small>
                                <button class="delete-point" data-id="${id}">Удалить</button>
                            `;
                            
                            // Создаем оверлей для попапа
                            const popup = new ol.Overlay({
                                element: popupContent,
                                positioning: 'bottom-center',
                                stopEvent: true
                            });
                            
                            map.addOverlay(popup);
                            popup.setPosition(coords);
                            
                            // Обработчик удаления
                            popupContent.querySelector('.delete-point').onclick = function() {
                                // Удаляем из массива
                                points = points.filter(p => p.id !== id);
                                
                                // Удаляем слой с карты
                                const markerIndex = markers.findIndex(m => m.id === id);
                                if (markerIndex !== -1) {
                                    map.removeLayer(markers[markerIndex].layer);
                                    markers.splice(markerIndex, 1);
                                }
                                
                                // Удаляем попап
                                map.removeOverlay(popup);
                                
                                // Сохраняем в localStorage
                                localStorage.setItem('wannago_points', JSON.stringify(points));
                            };
                        }
                    });
                }
                
                // Загружаем сохраненные точки
                const savedPoints = localStorage.getItem('wannago_points');
                if (savedPoints) {
                    points = JSON.parse(savedPoints);
                    points.forEach(point => createMarker(point));
                } else {
                    // Добавляем тестовую точку
                    const testPoint = {
                        id: Date.now(),
                        lat: 55.7558,
                        lng: 37.6176,
                        name: 'Красная площадь',
                        description: 'Главная площадь страны',
                        date: Date.now()
                    };
                    points.push(testPoint);
                    createMarker(testPoint);
                    localStorage.setItem('wannago_points', JSON.stringify(points));
                }
                
                // Переменные для новой точки
                let newPointLonLat = null;
                const modal = document.getElementById('modal');
                const pointName = document.getElementById('pointName');
                const pointDesc = document.getElementById('pointDesc');
                
                // Клик на карте
                map.on('click', function(e) {
                    const lonLat = ol.proj.toLonLat(e.coordinate);
                    newPointLonLat = {
                        lon: lonLat[0],
                        lat: lonLat[1]
                    };
                    modal.classList.add('show');
                    pointName.value = '';
                    pointDesc.value = '';
                    pointName.focus();
                });
                
                // Кнопка +
                document.getElementById('addBtn').onclick = function() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(position) {
                            const coords = ol.proj.fromLonLat([position.coords.longitude, position.coords.latitude]);
                            map.getView().animate({
                                center: coords,
                                zoom: 16,
                                duration: 1000
                            });
                            
                            newPointLonLat = {
                                lon: position.coords.longitude,
                                lat: position.coords.latitude
                            };
                            
                            setTimeout(() => {
                                modal.classList.add('show');
                                pointName.focus();
                            }, 1000);
                        });
                    }
                };
                
                // Отмена
                document.getElementById('cancelBtn').onclick = function() {
                    modal.classList.remove('show');
                    newPointLonLat = null;
                };
                
                // Сохранить
                document.getElementById('saveBtn').onclick = function() {
                    if (!newPointLonLat) return;
                    
                    const name = pointName.value.trim();
                    if (!name) {
                        alert('Введите название места');
                        return;
                    }
                    
                    const newPoint = {
                        id: Date.now(),
                        lat: newPointLonLat.lat,
                        lng: newPointLonLat.lon,
                        name: name,
                        description: pointDesc.value.trim() || '✨ Новое место',
                        date: Date.now()
                    };
                    
                    points.push(newPoint);
                    localStorage.setItem('wannago_points', JSON.stringify(points));
                    createMarker(newPoint);
                    
                    modal.classList.remove('show');
                    newPointLonLat = null;
                };
                
            } catch (e) {
                console.error('Ошибка:', e);
                alert('Ошибка загрузки карты: ' + e.message);
            }
        };
    </script>
</body>
</html>
