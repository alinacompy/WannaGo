<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WannaGo</title>
    
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css" />
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #ffe6d5;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-image {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .logo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .title span {
            color: #ff8a5c;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff0e6;
            padding: 6px 12px;
            border-radius: 30px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ff8a5c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #2d3436;
        }
        
        .description-main {
            padding: 12px 16px;
            background: #fff8f0;
            border-bottom: 1px solid #ffe6d5;
            text-align: center;
            font-size: 13px;
            color: #2d3436;
        }
        
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ffe6d5;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #b2bec3;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            color: #ff8a5c;
            border-bottom: 2px solid #ff8a5c;
        }
        
        #map {
            flex: 1;
            width: 100%;
            position: relative;
            display: block;
        }
        
        .routes-panel {
            flex: 1;
            width: 100%;
            background: #f8f9fc;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }
        
        .routes-panel.show {
            display: block;
        }
        
        .route-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #ffe6d5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .route-info h4 {
            font-size: 16px;
            color: #2d3436;
            margin-bottom: 4px;
        }
        
        .route-info p {
            font-size: 13px;
            color: #636e72;
        }
        
        .route-remove {
            background: #ff4444;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        
        .add-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #ff8a5c;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(255, 138, 92, 0.4);
            border: 2px solid white;
            cursor: pointer;
            z-index: 100;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #2d3436;
        }
        
        .modal-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe6d5;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #ff8a5c;
        }
        
        .modal-textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe6d5;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: none;
            min-height: 80px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .save {
            background: #ff8a5c;
            color: white;
        }
        
        .cancel {
            background: #f1f3f8;
            color: #2d3436;
        }
        
        /* Маркер */
        .custom-marker {
            width: 30px !important;
            height: 30px !important;
            background: #ff8a5c;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 10px rgba(255, 138, 92, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }
        
        .custom-marker.in-route {
            background: #5b67ea;
            box-shadow: 0 2px 10px rgba(91, 103, 234, 0.6);
        }
        
        .custom-marker:hover {
            transform: scale(1.2);
            z-index: 2000 !important;
        }
        
        /* Описание над точкой */
        .hover-popup {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 12px;
            padding: 10px 14px;
            min-width: 200px;
            max-width: 250px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 2px solid #ff8a5c;
            pointer-events: none;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            white-space: normal;
            word-wrap: break-word;
        }
        
        .custom-marker:hover .hover-popup {
            opacity: 1;
            visibility: visible;
        }
        
        .hover-popup::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #ff8a5c;
        }
        
        .hover-popup .name {
            font-weight: 700;
            color: #2d3436;
            font-size: 14px;
            margin-bottom: 4px;
            display: block;
        }
        
        .hover-popup .desc {
            color: #636e72;
            font-size: 12px;
            line-height: 1.4;
            display: block;
            margin-bottom: 4px;
        }
        
        .hover-popup .date {
            color: #b2bec3;
            font-size: 10px;
            display: block;
        }
        
        .hover-popup .route-badge {
            background: #5b67ea;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }
        
        /* Попап для телефона */
        .popup-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
            border-top: 3px solid #ff8a5c;
            z-index: 4000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .popup-overlay.show {
            transform: translateY(0);
        }
        
        .popup-overlay h3 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #2d3436;
            padding-right: 40px;
        }
        
        .popup-overlay p {
            color: #636e72;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .popup-overlay small {
            color: #b2bec3;
            font-size: 14px;
            display: block;
            margin-bottom: 16px;
        }
        
        .popup-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: #b2bec3;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f8f9fc;
        }
        
        .route-button {
            width: 100%;
            background: #ff8a5c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
        }
        
        .route-button.in-route {
            background: #5b67ea;
        }
        
        .counter {
            position: fixed;
            top: 200px;
            right: 16px;
            background: #ff8a5c;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 90;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .custom-marker:hover .hover-popup {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <div class="logo-image">
                <img src="https://github.com/alinacompy/WannaGo/raw/main/images/logo.jpg" alt="WannaGo">
            </div>
            <div class="title">Wanna<span>Go</span></div>
        </div>
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span class="user-name" id="userName">Гость</span>
        </div>
    </div>
    
    <div class="description-main">
        Отмечай любимые места, открывай маршруты других путешественников
    </div>
    
    <div class="tabs">
        <div class="tab active" data-tab="map">🗺️ Карта</div>
        <div class="tab" data-tab="routes">📍 Мой маршрут</div>
    </div>
    
    <div id="map"></div>
    
    <div class="routes-panel" id="routesPanel">
        <!-- Сюда будут загружаться сохранённые точки -->
    </div>
    
    <button class="add-button" id="addBtn">+</button>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">Новое место</div>
            <input type="text" class="modal-input" id="pointName" placeholder="Название">
            <textarea class="modal-textarea" id="pointDesc" placeholder="Описание (необязательно)"></textarea>
            <div class="modal-buttons">
                <button class="modal-button cancel" id="cancelBtn">Отмена</button>
                <button class="modal-button save" id="saveBtn">Добавить</button>
            </div>
        </div>
    </div>
    
    <div class="popup-overlay" id="popup">
        <span class="popup-close" id="closePopup">×</span>
        <h3 id="popupTitle"></h3>
        <p id="popupDesc"></p>
        <small id="popupDate"></small>
        <button class="route-button" id="routeBtn">➕ В маршрут</button>
    </div>
    
    <div class="counter" id="counter">0</div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    
    <script>
        window.onload = async function() {
            try {
                // ===== Инициализация Supabase =====
                const supabase = window.supabase.createClient(
                    'https://dfhkftlzoukxgbaeqkwr.supabase.co',
                    'sb_publishable_1jiNGUjveDwQtk7hercvdQ_82ZCFN8B'
                );
                
                // ===== Telegram WebApp =====
                const tg = window.Telegram?.WebApp;
                let currentUser = null;
                
                if (tg) {
                    tg.ready();
                    tg.expand();
                    
                    const initDataUnsafe = tg.initDataUnsafe;
                    
                    if (initDataUnsafe?.user) {
                        const user = initDataUnsafe.user;
                        currentUser = {
                            id: user.id,
                            first_name: user.first_name,
                            last_name: user.last_name || '',
                            username: user.username || '',
                            photo_url: user.photo_url || ''
                        };
                        
                        await supabase.from('users').upsert([{
                            id: user.id,
                            tg_id: user.id,
                            first_name: user.first_name,
                            last_name: user.last_name,
                            username: user.username,
                            photo_url: user.photo_url,
                            created_at: new Date().toISOString()
                        }], { onConflict: 'tg_id' });
                        
                        document.getElementById('userName').textContent = user.first_name;
                        if (user.photo_url) {
                            document.getElementById('userAvatar').innerHTML = `<img src="${user.photo_url}" style="width:100%;height:100%;border-radius:50%;">`;
                        } else {
                            document.getElementById('userAvatar').textContent = user.first_name[0].toUpperCase();
                        }
                    }
                }
                
                // ===== Создание карты =====
                const map = new ol.Map({
                    target: 'map',
                    layers: [
                        new ol.layer.Tile({
                            source: new ol.source.OSM()
                        })
                    ],
                    view: new ol.View({
                        center: ol.proj.fromLonLat([55.0, 55.0]),
                        zoom: 4
                    })
                });
                
                // ===== Загружаем точки =====
                const { data: points } = await supabase.from('points').select('*');
                
                // Загружаем маршрут текущего пользователя
                let userRoutes = [];
                if (currentUser) {
                    const { data: routes } = await supabase
                        .from('user_routes')
                        .select('point_id')
                        .eq('user_id', currentUser.id);
                    userRoutes = routes?.map(r => r.point_id) || [];
                }
                
                // ===== Создаём маркеры =====
                const markers = [];
                
                points.forEach(point => {
                    const markerDiv = document.createElement('div');
                    markerDiv.className = 'custom-marker';
                    if (userRoutes.includes(point.id)) {
                        markerDiv.classList.add('in-route');
                    }
                    
                    const position = ol.proj.fromLonLat([point.lng, point.lat]);
                    
                    // Попап для наведения (только на компьютере)
                    const hoverPopup = document.createElement('div');
                    hoverPopup.className = 'hover-popup';
                    
                    let routeBadge = '';
                    if (userRoutes.includes(point.id)) {
                        routeBadge = '<span class="route-badge">✓ В маршруте</span>';
                    }
                    
                    hoverPopup.innerHTML = `
                        <span class="name">${point.name}</span>
                        <span class="desc">${point.description || ''}</span>
                        <span class="date">${new Date(point.date).toLocaleDateString('ru-RU')}</span>
                        ${routeBadge}
                    `;
                    
                    markerDiv.appendChild(hoverPopup);
                    
                    const markerOverlay = new ol.Overlay({
                        position: position,
                        element: markerDiv,
                        stopEvent: true
                    });
                    
                    map.addOverlay(markerOverlay);
                    
                    // Клик на маркере (для телефона)
                    markerDiv.addEventListener('click', function(e) {
                        e.stopPropagation();
                        
                        document.getElementById('popupTitle').textContent = point.name;
                        document.getElementById('popupDesc').textContent = point.description || 'Интересное место';
                        document.getElementById('popupDate').textContent = 'Добавлено: ' + new Date(point.date).toLocaleDateString('ru-RU');
                        
                        const routeBtn = document.getElementById('routeBtn');
                        const isInRoute = userRoutes.includes(point.id);
                        
                        routeBtn.textContent = isInRoute ? '✓ Уже в маршруте' : '➕ В маршрут';
                        routeBtn.classList.toggle('in-route', isInRoute);
                        
                        routeBtn.onclick = async function() {
                            if (!currentUser) {
                                alert('Авторизуйтесь в Telegram');
                                return;
                            }
                            
                            if (!isInRoute) {
                                await supabase.from('user_routes').insert([{
                                    id: Date.now(),
                                    user_id: currentUser.id,
                                    point_id: point.id,
                                    added_at: new Date().toISOString()
                                }]);
                                
                                userRoutes.push(point.id);
                                markerDiv.classList.add('in-route');
                                routeBtn.textContent = '✓ Уже в маршруте';
                                routeBtn.classList.add('in-route');
                                
                                // Добавляем бейдж в попап наведения
                                const badge = document.createElement('span');
                                badge.className = 'route-badge';
                                badge.textContent = '✓ В маршруте';
                                hoverPopup.appendChild(badge);
                            }
                        };
                        
                        document.getElementById('popup').classList.add('show');
                    });
                    
                    markers.push(markerOverlay);
                });
                
                document.getElementById('counter').textContent = points.length + ' мест';
                
                // ===== Загрузка маршрута =====
                async function loadUserRoutes() {
                    if (!currentUser) return;
                    
                    const { data: routes } = await supabase
                        .from('user_routes')
                        .select('*, points(*)')
                        .eq('user_id', currentUser.id);
                    
                    const panel = document.getElementById('routesPanel');
                    panel.innerHTML = '';
                    
                    if (!routes || routes.length === 0) {
                        panel.innerHTML = '<div style="text-align: center; color: #b2bec3; padding: 40px;">Маршрут пуст</div>';
                        return;
                    }
                    
                    routes.forEach(route => {
                        const point = route.points;
                        const item = document.createElement('div');
                        item.className = 'route-item';
                        item.innerHTML = `
                            <div class="route-info">
                                <h4>${point.name}</h4>
                                <p>${point.description || ''}</p>
                            </div>
                            <button class="route-remove" data-id="${point.id}">×</button>
                        `;
                        
                        item.querySelector('.route-remove').onclick = async function() {
                            await supabase
                                .from('user_routes')
                                .delete()
                                .eq('user_id', currentUser.id)
                                .eq('point_id', point.id);
                            
                            userRoutes = userRoutes.filter(id => id !== point.id);
                            loadUserRoutes();
                        };
                        
                        panel.appendChild(item);
                    });
                }
                
                // ===== Переключение вкладок =====
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', function() {
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        
                        const tabName = this.dataset.tab;
                        
                        if (tabName === 'map') {
                            document.getElementById('map').style.display = 'block';
                            document.getElementById('routesPanel').classList.remove('show');
                        } else {
                            document.getElementById('map').style.display = 'none';
                            document.getElementById('routesPanel').classList.add('show');
                            loadUserRoutes();
                        }
                    });
                });
                
                // ===== Закрытие попапа =====
                document.getElementById('closePopup').onclick = function() {
                    document.getElementById('popup').classList.remove('show');
                };
                
                document.getElementById('popup').onclick = function(e) {
                    if (e.target === this) {
                        this.classList.remove('show');
                    }
                };
                
                // ===== Добавление новой точки =====
                let newLat = null, newLng = null;
                const modal = document.getElementById('modal');
                
                map.on('click', function(e) {
                    let clickedOnMarker = false;
                    map.forEachFeatureAtPixel(e.pixel, () => { clickedOnMarker = true; });
                    
                    if (!clickedOnMarker) {
                        const coords = ol.proj.toLonLat(e.coordinate);
                        newLat = coords[1];
                        newLng = coords[0];
                        modal.classList.add('show');
                        document.getElementById('pointName').value = '';
                        document.getElementById('pointDesc').value = '';
                    }
                });
                
                document.getElementById('addBtn').onclick = function() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(pos) {
                            const coords = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                            map.getView().animate({ center: coords, zoom: 10 });
                            newLat = pos.coords.latitude;
                            newLng = pos.coords.longitude;
                            modal.classList.add('show');
                        });
                    }
                };
                
                document.getElementById('cancelBtn').onclick = () => {
                    modal.classList.remove('show');
                    newLat = newLng = null;
                };
                
                document.getElementById('saveBtn').onclick = async () => {
                    const name = document.getElementById('pointName').value.trim();
                    if (!name) return alert('Введите название');
                    
                    const newPoint = {
                        id: Date.now(),
                        lat: newLat,
                        lng: newLng,
                        name: name,
                        description: document.getElementById('pointDesc').value.trim() || 'Интересное место',
                        date: new Date().toISOString()
                    };
                    
                    await supabase.from('points').insert([newPoint]);
                    modal.classList.remove('show');
                    newLat = newLng = null;
                    location.reload();
                };
                
            } catch (error) {
                console.error('Ошибка:', error);
            }
        };
    </script>
</body>
</html>
