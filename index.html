<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WannaGo</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Шапка */
        .header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ffe6d5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-image {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ff8a5c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .title span {
            color: #ff8a5c;
        }
        
        /* Описание */
        .description {
            padding: 16px;
            background: #fff8f0;
            border-bottom: 1px solid #ffe6d5;
            text-align: center;
            font-size: 14px;
            color: #2d3436;
        }
        
        /* Карта */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }
        
        /* Кнопка */
        .add-button {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #ff8a5c;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(255, 138, 92, 0.4);
            border: 2px solid white;
            cursor: pointer;
            z-index: 100;
        }
        
        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 320px;
            text-align: center;
        }
        
        .modal-content p {
            margin: 16px 0;
            color: #2d3436;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .save {
            background: #ff8a5c;
            color: white;
        }
        
        .cancel {
            background: #f1f3f8;
            color: #2d3436;
        }
        
        /* Информация */
        .info {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            text-align: center;
            font-size: 12px;
            color: #636e72;
            background: rgba(255,255,255,0.9);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ffe6d5;
            z-index: 90;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-image">WG</div>
        <div class="title">Wanna<span>Go</span></div>
    </div>
    
    <div class="description">
        Отмечай любимые места, открывай маршруты других путешественников и создавай своё идеальное путешествие
    </div>
    
    <div id="map"></div>
    
    <button class="add-button" id="addBtn">+</button>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Добавить точку?</h3>
            <p>Вы хотите отметить это место?</p>
            <div class="modal-buttons">
                <button class="modal-button cancel" id="cancelBtn">Нет</button>
                <button class="modal-button save" id="saveBtn">Да</button>
            </div>
        </div>
    </div>
    
    <div class="info" id="info">
        Загрузка карты...
    </div>

    <!-- Подключаем Leaflet JavaScript ПОСЛЕ карты -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Ждем загрузки страницы
        window.onload = function() {
            try {
                // Создаем карту
                const map = L.map('map').setView([55.7558, 37.6176], 10);
                
                // Добавляем слой карты
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: 'WannaGo'
                }).addTo(map);
                
                // Добавляем тестовую точку
                L.marker([55.7558, 37.6176]).addTo(map)
                    .bindPopup('Красная площадь')
                    .openPopup();
                
                document.getElementById('info').innerHTML = '👤 Гость · карта загружена';
                
                // Переменные для модального окна
                let clickLat = null;
                let clickLng = null;
                const modal = document.getElementById('modal');
                
                // Клик на карте
                map.on('click', function(e) {
                    clickLat = e.latlng.lat;
                    clickLng = e.latlng.lng;
                    modal.classList.add('show');
                });
                
                // Кнопка +
                document.getElementById('addBtn').onclick = function() {
                    map.locate({setView: true, maxZoom: 16});
                };
                
                // Геолокация
                map.on('locationfound', function(e) {
                    L.marker(e.latlng).addTo(map)
                        .bindPopup('Вы здесь').openPopup();
                });
                
                // Отмена
                document.getElementById('cancelBtn').onclick = function() {
                    modal.classList.remove('show');
                    clickLat = null;
                    clickLng = null;
                };
                
                // Сохранить
                document.getElementById('saveBtn').onclick = function() {
                    if (clickLat && clickLng) {
                        L.marker([clickLat, clickLng]).addTo(map)
                            .bindPopup('Новое место').openPopup();
                        modal.classList.remove('show');
                        document.getElementById('info').innerHTML = '✅ Точка добавлена';
                    }
                };
                
            } catch (e) {
                document.getElementById('info').innerHTML = '❌ Ошибка: ' + e.message;
                console.error(e);
            }
        };
    </script>
</body>
</html>
