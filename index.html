<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WannaGo</title>
    
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css" />
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #ffe6d5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-image {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #ff8a5c;
        }
        
        .logo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .title span {
            color: #ff8a5c;
        }
        
        .description-main {
            padding: 12px 16px;
            background: #fff8f0;
            border-bottom: 1px solid #ffe6d5;
            text-align: center;
            font-size: 13px;
            color: #2d3436;
        }
        
        .description-secondary {
            padding: 8px 16px;
            background: white;
            text-align: center;
            font-size: 12px;
            color: #ff8a5c;
            border-bottom: 1px solid #ffe6d5;
            font-style: italic;
        }
        
        #map {
            flex: 1;
            width: 100%;
            position: relative;
        }
        
        .add-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #ff8a5c;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(255, 138, 92, 0.4);
            border: 2px solid white;
            cursor: pointer;
            z-index: 100;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #2d3436;
        }
        
        .modal-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe6d5;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #ff8a5c;
        }
        
        .modal-textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe6d5;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: none;
            min-height: 80px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .save {
            background: #ff8a5c;
            color: white;
        }
        
        .cancel {
            background: #f1f3f8;
            color: #2d3436;
        }
        
        .custom-marker {
            width: 24px !important;
            height: 24px !important;
            background: #ff8a5c;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(255, 138, 92, 0.4);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .custom-marker:hover {
            transform: scale(1.2);
            z-index: 1000;
        }
        
        /* Попап для наведения (компьютер) */
        .hover-popup {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 12px;
            padding: 8px 12px;
            min-width: 160px;
            max-width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid #ff8a5c;
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: none;
            z-index: 2000;
        }
        
        .custom-marker:hover .hover-popup {
            display: block;
        }
        
        .hover-popup::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #ff8a5c;
        }
        
        .hover-popup span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .hover-popup .name {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 2px;
        }
        
        .hover-popup .desc {
            color: #636e72;
            font-size: 11px;
        }
        
        /* Попап для телефона (на весь экран снизу) */
        .popup-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
            border-top: 3px solid #ff8a5c;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 50vh;
            overflow-y: auto;
        }
        
        .popup-overlay.show {
            transform: translateY(0);
        }
        
        .popup-overlay h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #2d3436;
            padding-right: 40px;
        }
        
        .popup-overlay p {
            color: #636e72;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .popup-overlay small {
            color: #b2bec3;
            font-size: 13px;
            display: block;
            margin-bottom: 16px;
        }
        
        .popup-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            color: #b2bec3;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f8f9fc;
        }
        
        .counter {
            position: fixed;
            top: 130px;
            right: 16px;
            background: #ff8a5c;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 90;
            opacity: 0.9;
        }
        
        /* Скрываем hover-попап на телефонах */
        @media (max-width: 768px) {
            .hover-popup {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-image">
            <img src="https://github.com/alinacompy/WannaGo/raw/main/images/logo.jpg" alt="WannaGo">
        </div>
        <div class="title">Wanna<span>Go</span></div>
    </div>
    
    <div class="description-main">
        Отмечай любимые места, открывай маршруты других путешественников и создавай своё идеальное путешествие
    </div>
    
    <div class="description-secondary">
        👆 Нажми на карту чтобы добавить место · Наведи на точку для описания
    </div>
    
    <div id="map"></div>
    
    <button class="add-button" id="addBtn">+</button>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">Новое место</div>
            <input type="text" class="modal-input" id="pointName" placeholder="Название">
            <textarea class="modal-textarea" id="pointDesc" placeholder="Описание (необязательно)"></textarea>
            <div class="modal-buttons">
                <button class="modal-button cancel" id="cancelBtn">Отмена</button>
                <button class="modal-button save" id="saveBtn">Добавить</button>
            </div>
        </div>
    </div>
    
    <!-- Попап для телефона -->
    <div class="popup-overlay" id="popup">
        <span class="popup-close" id="closePopup">×</span>
        <h3 id="popupTitle"></h3>
        <p id="popupDesc"></p>
        <small id="popupDate"></small>
    </div>
    
    <div class="counter" id="counter">0</div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    
    <script>
        window.onload = async function() {
            try {
                // ===== Подключение к Supabase =====
                const supabase = window.supabase.createClient(
                    'https://dfhkftlzoukxgbaeqkwr.supabase.co',
                    'sb_publishable_1jiNGUjveDwQtk7hercvdQ_82ZCFN8B'
                );
                
                // ===== Создание карты =====
                const map = new ol.Map({
                    target: 'map',
                    layers: [
                        new ol.layer.Tile({
                            source: new ol.source.OSM()
                        })
                    ],
                    view: new ol.View({
                        center: ol.proj.fromLonLat([55.0, 55.0]),
                        zoom: 4
                    })
                });
                
                // ===== Популярные места =====
                const popularPlaces = [
                    { name: 'Красная площадь', lat: 55.7539, lng: 37.6208, desc: 'Главная площадь Москвы' },
                    { name: 'Московский Кремль', lat: 55.7517, lng: 37.6176, desc: 'Древняя крепость' },
                    { name: 'ВДНХ', lat: 55.8239, lng: 37.6393, desc: 'Выставка достижений' },
                    { name: 'Суздальский кремль', lat: 56.4156, lng: 40.4423, desc: 'Древний кремль' },
                    { name: 'Троице-Сергиева лавра', lat: 56.3101, lng: 38.1295, desc: 'Крупнейший монастырь' },
                    { name: 'Ясная Поляна', lat: 54.0751, lng: 37.5263, desc: 'Усадьба Толстого' },
                    { name: 'Эрмитаж', lat: 59.9398, lng: 30.3146, desc: 'Зимний дворец' },
                    { name: 'Петродворец', lat: 59.8849, lng: 29.9097, desc: 'Столица фонтанов' },
                    { name: 'Исаакиевский собор', lat: 59.9340, lng: 30.3061, desc: 'Величайший храм' },
                    { name: 'Уральский Марс', lat: 56.6626, lng: 62.0872, desc: 'Неземной ландшафт' },
                    { name: 'Оленьи ручьи', lat: 56.5178, lng: 59.2394, desc: 'Природный парк' },
                    { name: 'Азов-гора', lat: 56.4764, lng: 60.1569, desc: 'Сердце Урала' },
                    { name: 'Тальков камень', lat: 56.4592, lng: 60.7167, desc: 'Бирюзовое озеро' },
                    { name: 'Чертово городище', lat: 56.8956, lng: 60.4089, desc: 'Гранитные скалы' },
                    { name: 'Невьянская башня', lat: 57.4894, lng: 60.2125, desc: 'Наклонная башня' },
                    { name: 'Таганай', lat: 55.2608, lng: 59.7933, desc: 'Национальный парк' },
                    { name: 'Озеро Тургояк', lat: 55.1500, lng: 60.0667, desc: 'Чистейшая вода' },
                    { name: 'Аркаим', lat: 52.6496, lng: 59.5712, desc: 'Древнее поселение' },
                    { name: 'Дивья пещера', lat: 58.2841, lng: 56.5978, desc: 'Красивейшая пещера' }
                ];
                
                // ===== Добавляем точки в базу если их нет =====
                const { data: existingPoints } = await supabase.from('points').select('*');
                
                if (!existingPoints || existingPoints.length === 0) {
                    for (const place of popularPlaces) {
                        const newPoint = {
                            id: Date.now() + Math.random(),
                            lat: place.lat,
                            lng: place.lng,
                            name: place.name,
                            description: place.desc,
                            date: new Date().toISOString()
                        };
                        await supabase.from('points').insert([newPoint]);
                    }
                }
                
                // ===== Загружаем все точки =====
                const { data: points } = await supabase.from('points').select('*');
                
                // ===== Создаем маркеры =====
                points.forEach(point => {
                    const markerDiv = document.createElement('div');
                    markerDiv.className = 'custom-marker';
                    
                    // Добавляем попап для наведения (компьютер)
                    const hoverPopup = document.createElement('div');
                    hoverPopup.className = 'hover-popup';
                    hoverPopup.innerHTML = `
                        <span class="name">${point.name}</span>
                        <span class="desc">${point.description || 'Интересное место'}</span>
                    `;
                    markerDiv.appendChild(hoverPopup);
                    
                    const position = ol.proj.fromLonLat([point.lng, point.lat]);
                    
                    const markerOverlay = new ol.Overlay({
                        position: position,
                        element: markerDiv,
                        stopEvent: true
                    });
                    
                    map.addOverlay(markerOverlay);
                    
                    // Для телефона - показываем нижний попап при клике
                    markerDiv.addEventListener('click', function(e) {
                        e.stopPropagation();
                        
                        // Проверяем, что это телефон (touch device)
                        if ('ontouchstart' in window) {
                            document.getElementById('popupTitle').textContent = point.name;
                            document.getElementById('popupDesc').textContent = point.description || 'Интересное место';
                            document.getElementById('popupDate').textContent = 'Добавлено: ' + new Date(point.date).toLocaleDateString('ru-RU');
                            document.getElementById('popup').classList.add('show');
                        }
                    });
                });
                
                document.getElementById('counter').textContent = points.length + ' мест';
                
                // ===== Закрытие попапа =====
                document.getElementById('closePopup').onclick = function() {
                    document.getElementById('popup').classList.remove('show');
                };
                
                // Клик вне попапа тоже закрывает
                document.getElementById('popup').onclick = function(e) {
                    if (e.target === this) {
                        this.classList.remove('show');
                    }
                };
                
                // ===== Добавление новой точки =====
                let newLat = null, newLng = null;
                const modal = document.getElementById('modal');
                
                map.on('click', function(e) {
                    // Проверяем, что клик не по маркеру
                    const element = map.forEachFeatureAtPixel(e.pixel, () => true);
                    if (!element) {
                        const coords = ol.proj.toLonLat(e.coordinate);
                        newLat = coords[1];
                        newLng = coords[0];
                        modal.classList.add('show');
                        document.getElementById('pointName').value = '';
                        document.getElementById('pointDesc').value = '';
                    }
                });
                
                document.getElementById('addBtn').onclick = function() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(pos) {
                            const coords = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                            map.getView().animate({ center: coords, zoom: 10 });
                            newLat = pos.coords.latitude;
                            newLng = pos.coords.longitude;
                            modal.classList.add('show');
                        });
                    }
                };
                
                document.getElementById('cancelBtn').onclick = () => {
                    modal.classList.remove('show');
                    newLat = newLng = null;
                };
                
                document.getElementById('saveBtn').onclick = async () => {
                    const name = document.getElementById('pointName').value.trim();
                    if (!name) return alert('Введите название');
                    
                    const newPoint = {
                        id: Date.now(),
                        lat: newLat,
                        lng: newLng,
                        name: name,
                        description: document.getElementById('pointDesc').value.trim() || 'Интересное место',
                        date: new Date().toISOString()
                    };
                    
                    await supabase.from('points').insert([newPoint]);
                    modal.classList.remove('show');
                    newLat = newLng = null;
                    location.reload();
                };
                
            } catch (error) {
                console.error('Ошибка:', error);
            }
        };
    </script>
</body>
</html>
